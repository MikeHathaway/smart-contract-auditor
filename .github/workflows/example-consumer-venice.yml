name: Smart Contract Audit (Venice)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  audit:
    uses: MikeHathaway/smart-contract-auditor/.github/workflows/codex-smart-contract-audit.yml@main
    with:
      provider: venice
      # Leave model/effort blank to use the workflow's Venice defaults:
      # - model: openai-gpt-54
      # - effort: high
      model: ""
      effort: ""
      working-directory: .
      severity-threshold: medium
      fail-on-severity: high
      post-pr-comment: true
      pr-number: ${{ github.event.pull_request.number }}
      base-sha: ${{ github.event.pull_request.base.sha }}
      head-sha: ${{ github.event.pull_request.head.sha }}
    secrets:
      VENICE_API_KEY: ${{ secrets.VENICE_API_KEY }}
