name: Codex Smart Contract Audit

on:
  workflow_call:
    inputs:
      provider:
        description: AI provider selection. Use `auto`, `openai`, or `venice`.
        required: false
        type: string
        default: auto
      model:
        description: Optional model override. Leave empty to use provider defaults.
        required: false
        type: string
        default: ""
      effort:
        description: Optional reasoning effort override. Leave empty to use provider defaults.
        required: false
        type: string
        default: ""
      responses-api-endpoint:
        description: Optional Responses API endpoint override. Venice defaults to https://api.venice.ai/api/v1/responses.
        required: false
        type: string
        default: ""
      working-directory:
        description: Repository subdirectory to prioritize during audit.
        required: false
        type: string
        default: "."
      severity-threshold:
        description: Minimum severity the report should emphasize in summaries.
        required: false
        type: string
        default: medium
      fail-on-severity:
        description: Fail the workflow when findings at or above this severity exist. Leave empty to never fail.
        required: false
        type: string
        default: ""
      post-pr-comment:
        description: Post or update a sticky pull request summary comment.
        required: false
        type: boolean
        default: true
      extra-audit-instructions:
        description: Extra markdown appended to the audit prompt.
        required: false
        type: string
        default: ""
      base-sha:
        description: Optional explicit PR base SHA.
        required: false
        type: string
        default: ""
      head-sha:
        description: Optional explicit PR head SHA.
        required: false
        type: string
        default: ""
      pr-number:
        description: Optional explicit pull request number.
        required: false
        type: string
        default: ""
    secrets:
      OPENAI_API_KEY:
        required: false
      VENICE_API_KEY:
        required: false

concurrency:
  group: codex-smart-contract-audit-${{ github.repository }}-${{ inputs.pr-number || github.run_id }}-${{ inputs.working-directory }}
  cancel-in-progress: true

jobs:
  audit:
    name: Run sequential multi-skill audit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OPENAI_API_KEY_VALUE: ${{ secrets.OPENAI_API_KEY }}
      VENICE_API_KEY_VALUE: ${{ secrets.VENICE_API_KEY }}
    permissions:
      contents: read
    outputs:
      pr_number: ${{ steps.summarize.outputs.pr_number }}
      overall_status: ${{ steps.summarize.outputs.overall_status }}
      critical: ${{ steps.summarize.outputs.critical }}
      high: ${{ steps.summarize.outputs.high }}
      medium: ${{ steps.summarize.outputs.medium }}
      low: ${{ steps.summarize.outputs.low }}
      informational: ${{ steps.summarize.outputs.informational }}
      blocked_checks: ${{ steps.summarize.outputs.blocked_checks }}
      artifact_name: ${{ steps.summarize.outputs.artifact_name }}
    steps:
      - name: Resolve reusable workflow source
        id: workflow_source
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          repository="${WORKFLOW_REF%%/.github/workflows/*}"
          ref="${WORKFLOW_REF##*@}"
          echo "repository=$repository" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout caller repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout audit tooling repository
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.workflow_source.outputs.repository }}
          ref: ${{ steps.workflow_source.outputs.ref }}
          path: .codex-smart-contract-auditor-src
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare workspace directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .codex-smart-contract-auditor/preflight .agents/skills .context/outputs

      - name: Install deterministic audit prerequisites
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y graphviz ripgrep jq
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user --upgrade slither-analyzer solc-select
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Detect Solidity toolchain layout
        id: toolchain_layout
        shell: bash
        env:
          INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          workdir="$INPUT_WORKING_DIRECTORY"

          foundry=false
          hardhat=false

          [[ -f "$workdir/foundry.toml" ]] && foundry=true
          compgen -G "$workdir/hardhat.config.*" >/dev/null && hardhat=true || true

          echo "foundry=$foundry" >> "$GITHUB_OUTPUT"
          echo "hardhat=$hardhat" >> "$GITHUB_OUTPUT"

      - name: Install Foundry when a Foundry repo is detected
        if: ${{ steps.toolchain_layout.outputs.foundry == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v forge >/dev/null 2>&1; then
            exit 0
          fi
          curl -L https://foundry.paradigm.xyz | bash
          "$HOME/.foundry/bin/foundryup"
          echo "$HOME/.foundry/bin" >> "$GITHUB_PATH"

      - name: Resolve audit context
        id: context
        shell: bash
        env:
          INPUT_BASE_SHA: ${{ inputs.base-sha }}
          INPUT_HEAD_SHA: ${{ inputs.head-sha }}
          INPUT_PR_NUMBER: ${{ inputs.pr-number }}
          INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
          INPUT_SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        run: |
          set -euo pipefail

          base_sha="$INPUT_BASE_SHA"
          head_sha="$INPUT_HEAD_SHA"
          pr_number="$INPUT_PR_NUMBER"
          preflight_dir=".codex-smart-contract-auditor/preflight"

          if [[ -z "$base_sha" ]]; then
            base_sha="$(jq -r '.pull_request.base.sha // empty' "$GITHUB_EVENT_PATH")"
          fi
          if [[ -z "$head_sha" ]]; then
            head_sha="$(jq -r '.pull_request.head.sha // empty' "$GITHUB_EVENT_PATH")"
          fi
          if [[ -z "$pr_number" ]]; then
            pr_number="$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH")"
          fi
          if [[ -z "$head_sha" ]]; then
            head_sha="$(git rev-parse HEAD)"
          fi

          changed_files="$preflight_dir/changed-files.txt"
          if [[ -n "$base_sha" ]]; then
            git diff --name-only "$base_sha" "$head_sha" > "$changed_files" || true
            git diff --stat "$base_sha" "$head_sha" > "$preflight_dir/diff-stat.txt" || true
          else
            git ls-files > "$changed_files"
            printf 'Base SHA unavailable; using repository file list as fallback.\n' > "$preflight_dir/diff-stat.txt"
          fi

          solidity_changes="$preflight_dir/solidity-changes.txt"
          grep -E '\.(sol|vy)$' "$changed_files" > "$solidity_changes" || true

          contract_files="$preflight_dir/contract-files.txt"
          test_files="$preflight_dir/test-files.txt"
          script_files="$preflight_dir/script-files.txt"
          entry_points="$preflight_dir/public-entry-points.txt"
          privileged_entry_points="$preflight_dir/privileged-entry-points.txt"
          token_surface="$preflight_dir/token-surface.txt"
          upgrade_surface="$preflight_dir/upgrade-surface.txt"
          access_control_surface="$preflight_dir/access-control-surface.txt"
          blast_radius="$preflight_dir/blast-radius-seeds.txt"

          find "$INPUT_WORKING_DIRECTORY" -type f \( -name '*.sol' -o -name '*.vy' \) | sort > "$contract_files" || true
          find "$INPUT_WORKING_DIRECTORY" -type f \
            \( -path '*/test/*' -o -path '*/tests/*' -o -name '*.t.sol' -o -name '*Test.sol' -o -name '*.spec.ts' -o -name '*.test.ts' -o -name '*.spec.js' -o -name '*.test.js' \) \
            | sort > "$test_files" || true
          find "$INPUT_WORKING_DIRECTORY" -type f \
            \( -path '*/script/*' -o -path '*/scripts/*' -o -name '*Deploy*.s.sol' -o -name '*deploy*.ts' -o -name '*deploy*.js' \) \
            | sort > "$script_files" || true

          rg --no-heading --line-number 'function\s+[A-Za-z0-9_]+\s*\([^)]*\)\s*(public|external)' "$INPUT_WORKING_DIRECTORY" > "$entry_points" || true
          rg --no-heading --line-number 'function\s+[A-Za-z0-9_]+\s*\([^)]*\)[^{;]*\b(onlyOwner|onlyRole|auth|requiresAuth|governor|admin)\b' "$INPUT_WORKING_DIRECTORY" > "$privileged_entry_points" || true
          rg --no-heading --line-number 'IERC20|IERC721|IERC1155|ERC20|ERC721|ERC1155|transferFrom|safeTransferFrom|approve\(|permit\(' "$INPUT_WORKING_DIRECTORY" > "$token_surface" || true
          rg --no-heading --line-number 'UUPSUpgradeable|TransparentUpgradeableProxy|ERC1967|ProxyAdmin|upgradeTo|upgradeToAndCall|initializer|reinitializer' "$INPUT_WORKING_DIRECTORY" > "$upgrade_surface" || true
          rg --no-heading --line-number 'onlyOwner|onlyRole|AccessControl|Ownable|auth|governor|timelock|multisig|pause\(|unpause\(' "$INPUT_WORKING_DIRECTORY" > "$access_control_surface" || true

          : > "$blast_radius"
          if [[ -s "$solidity_changes" ]]; then
            while IFS= read -r file; do
              [[ -f "$file" ]] || continue
              printf '%s\n' "$file" >> "$blast_radius"
              rg --no-heading --line-number '^\s*import\s+' "$file" >> "$blast_radius" || true
              rg --no-heading --line-number 'contract\s+.+\s+is\s+' "$file" >> "$blast_radius" || true
            done < "$solidity_changes"
          fi

          {
            echo "# Runtime Audit Context"
            echo
            echo "- Working directory: $INPUT_WORKING_DIRECTORY"
            echo "- Severity threshold: $INPUT_SEVERITY_THRESHOLD"
            echo "- Base SHA: ${base_sha:-unavailable}"
            echo "- Head SHA: ${head_sha:-unavailable}"
            echo "- Pull request number: ${pr_number:-unavailable}"
            echo
            echo "## Repository layout"
            find . -maxdepth 2 \
              \( -name 'foundry.toml' -o -name 'hardhat.config.*' -o -name 'package.json' -o -name 'pyproject.toml' -o -name 'remappings.txt' \) \
              -print | sort || true
            echo
            echo "## Tool availability"
            printf -- "- slither: %s\n" "$(command -v slither >/dev/null 2>&1 && slither --version 2>/dev/null | head -1 || echo unavailable)"
            printf -- "- solc-select: %s\n" "$(command -v solc-select >/dev/null 2>&1 && solc-select --version 2>/dev/null | head -1 || echo unavailable)"
            printf -- "- forge: %s\n" "$(command -v forge >/dev/null 2>&1 && forge --version 2>/dev/null | head -1 || echo unavailable)"
            printf -- "- node: %s\n" "$(command -v node >/dev/null 2>&1 && node --version 2>/dev/null || echo unavailable)"
            echo
            echo "## Diff stat"
            cat "$preflight_dir/diff-stat.txt"
            echo
            echo "## Changed files"
            sed 's/^/- /' "$changed_files" || true
            echo
            echo "## Contract inventory"
            sed 's/^/- /' "$contract_files" || true
            echo
            echo "## Test inventory"
            sed 's/^/- /' "$test_files" || true
            echo
            echo "## Script inventory"
            sed 's/^/- /' "$script_files" || true
            echo
            echo "## Solidity / Vyper changes"
            sed 's/^/- /' "$solidity_changes" || true
            echo
            echo "## Blast radius seeds"
            sed 's/^/- /' "$blast_radius" || true
            echo
            echo "## Public / external entry points"
            cat "$entry_points" || true
            echo
            echo "## Privileged entry points"
            cat "$privileged_entry_points" || true
            echo
            echo "## Token surface"
            cat "$token_surface" || true
            echo
            echo "## Upgrade surface"
            cat "$upgrade_surface" || true
            echo
            echo "## Access control surface"
            cat "$access_control_surface" || true
          } > .codex-smart-contract-auditor/runtime-context.md

          {
            echo "# Deterministic Preflight Summary"
            echo
            printf -- "- Changed files: %s\n" "$(wc -l < "$changed_files" | tr -d ' ')"
            printf -- "- Solidity/Vyper changes: %s\n" "$(wc -l < "$solidity_changes" | tr -d ' ')"
            printf -- "- Contracts discovered: %s\n" "$(wc -l < "$contract_files" | tr -d ' ')"
            printf -- "- Tests discovered: %s\n" "$(wc -l < "$test_files" | tr -d ' ')"
            printf -- "- Scripts discovered: %s\n" "$(wc -l < "$script_files" | tr -d ' ')"
            printf -- "- Public/external entry points: %s\n" "$(wc -l < "$entry_points" | tr -d ' ')"
            printf -- "- Privileged entry points: %s\n" "$(wc -l < "$privileged_entry_points" | tr -d ' ')"
            printf -- "- Token surface hits: %s\n" "$(wc -l < "$token_surface" | tr -d ' ')"
            printf -- "- Upgrade surface hits: %s\n" "$(wc -l < "$upgrade_surface" | tr -d ' ')"
          } > "$preflight_dir/summary.md"

          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Install external skill packs
        shell: bash
        run: |
          set -euo pipefail
          chmod +x .codex-smart-contract-auditor-src/install-skills.sh
          REPO_ROOT="$GITHUB_WORKSPACE" \
          WORKSPACE_SKILLS_DIR="$GITHUB_WORKSPACE/.agents/skills" \
          STATE_DIR="$GITHUB_WORKSPACE/.codex-smart-contract-auditor" \
          ./.codex-smart-contract-auditor-src/install-skills.sh

      - name: Run deterministic preflight scans
        shell: bash
        env:
          INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
          HAS_FOUNDRY: ${{ steps.toolchain_layout.outputs.foundry }}
        run: |
          set -euo pipefail
          preflight_dir=".codex-smart-contract-auditor/preflight"
          blockers="$preflight_dir/tool-blockers.md"
          checks="$preflight_dir/preflight-checks.md"
          contract_files="$preflight_dir/contract-files.txt"

          : > "$blockers"
          : > "$checks"

          run_preflight_scan() {
            local label="$1"
            shift
            local out="$preflight_dir/${label}.txt"
            local err="$preflight_dir/${label}.stderr"
            if timeout 600s "$@" >"$out" 2>"$err"; then
              printf -- "- %s: ok\n" "$label" >> "$checks"
            else
              printf -- "- %s: blocked\n" "$label" >> "$checks"
              {
                printf '## %s\n' "$label"
                if [[ -s "$err" ]]; then
                  head -40 "$err"
                else
                  printf 'Command exited without stderr output.\n'
                fi
                printf '\n'
              } >> "$blockers"
              rm -f "$out"
            fi
          }

          if [[ -s "$contract_files" ]]; then
            run_preflight_scan "slither-human-summary" slither "$INPUT_WORKING_DIRECTORY" --exclude-dependencies --print human-summary
            run_preflight_scan "slither-contract-summary" slither "$INPUT_WORKING_DIRECTORY" --exclude-dependencies --print contract-summary
            run_preflight_scan "slither-function-summary" slither "$INPUT_WORKING_DIRECTORY" --exclude-dependencies --print function-summary
            run_preflight_scan "slither-vars-and-auth" slither "$INPUT_WORKING_DIRECTORY" --exclude-dependencies --print vars-and-auth
          else
            printf '## slither-preflight\nNo Solidity or Vyper contracts detected under %s.\n' "$INPUT_WORKING_DIRECTORY" >> "$blockers"
          fi

          if [[ "$HAS_FOUNDRY" == "true" ]] && command -v forge >/dev/null 2>&1; then
            run_preflight_scan "forge-test-list" forge test --root "$INPUT_WORKING_DIRECTORY" --list
          else
            printf '## forge-test-list\nFoundry not detected or forge is unavailable.\n' >> "$blockers"
          fi

      - name: Generate runtime prompt
        shell: bash
        env:
          INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
          INPUT_EXTRA_AUDIT_INSTRUCTIONS: ${{ inputs.extra-audit-instructions }}
        run: |
          set -euo pipefail
          cat .codex-smart-contract-auditor-src/audit-prompt.md > .codex-smart-contract-auditor/prompt.md
          {
            echo
            echo "---"
            echo
            echo "## Runtime directives"
            echo
            echo "- Prioritize code under: \`$INPUT_WORKING_DIRECTORY\`"
            echo "- Treat the repository root as the output location for \`audit-report.md\` and \`audit-report.json\`."
            echo "- Use the repo-scoped skills installed in \`.agents/skills\`."
            echo "- Preserve raw forefy artifacts in \`.context/outputs/X/\` and do not overwrite existing numbered runs."
            echo "- Use preflight evidence from \`.codex-smart-contract-auditor/preflight/\` when present."
            echo "- If a tool is blocked by environment limits, record it in \`Blocked Checks\` instead of silently skipping it."
            if [[ -n "$INPUT_EXTRA_AUDIT_INSTRUCTIONS" ]]; then
              echo
              echo "## Extra audit instructions"
              echo
              printf '%s\n' "$INPUT_EXTRA_AUDIT_INSTRUCTIONS"
            fi
            echo
            cat .codex-smart-contract-auditor/runtime-context.md
          } >> .codex-smart-contract-auditor/prompt.md

      - name: Resolve provider configuration
        id: provider_config
        shell: bash
        env:
          INPUT_PROVIDER: ${{ inputs.provider }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_EFFORT: ${{ inputs.effort }}
          INPUT_RESPONSES_API_ENDPOINT: ${{ inputs.responses-api-endpoint }}
        run: |
          set -euo pipefail

          provider="$(printf '%s' "$INPUT_PROVIDER" | tr '[:upper:]' '[:lower:]')"
          endpoint="$INPUT_RESPONSES_API_ENDPOINT"
          model="$INPUT_MODEL"
          effort="$INPUT_EFFORT"
          key_source=""

          case "$provider" in
            ""|auto)
              provider="auto"
              ;;
            openai|venice)
              ;;
            *)
              echo "Unsupported provider value: $provider" >&2
              exit 1
              ;;
          esac

          if [[ "$provider" == "auto" ]]; then
            if [[ -n "$endpoint" ]] && [[ "$endpoint" == *"venice.ai"* ]]; then
              provider="venice"
            elif [[ -n "$VENICE_API_KEY_VALUE" ]] && [[ -z "$OPENAI_API_KEY_VALUE" ]]; then
              provider="venice"
            elif [[ -n "$OPENAI_API_KEY_VALUE" ]]; then
              provider="openai"
            elif [[ -n "$VENICE_API_KEY_VALUE" ]]; then
              provider="venice"
            else
              provider="openai"
            fi
          fi

          case "$provider" in
            openai)
              [[ -n "$OPENAI_API_KEY_VALUE" ]] && key_source="openai"
              ;;
            venice)
              endpoint="${endpoint:-https://api.venice.ai/api/v1/responses}"
              model="${model:-openai-gpt-54}"
              effort="${effort:-high}"
              if [[ -n "$VENICE_API_KEY_VALUE" ]]; then
                key_source="venice"
              elif [[ -n "$OPENAI_API_KEY_VALUE" ]]; then
                key_source="openai-fallback"
              fi
              ;;
          esac

          if [[ -n "$key_source" ]]; then
            echo "api_key_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "api_key_present=false" >> "$GITHUB_OUTPUT"
          fi

          echo "provider=$provider" >> "$GITHUB_OUTPUT"
          echo "responses_api_endpoint=$endpoint" >> "$GITHUB_OUTPUT"
          echo "model=$model" >> "$GITHUB_OUTPUT"
          echo "effort=$effort" >> "$GITHUB_OUTPUT"
          echo "key_source=$key_source" >> "$GITHUB_OUTPUT"

      - name: Run Codex sequential audit with OpenAI
        id: run_codex_openai
        if: ${{ steps.provider_config.outputs.provider == 'openai' && steps.provider_config.outputs.api_key_present == 'true' }}
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ env.OPENAI_API_KEY_VALUE }}
          responses-api-endpoint: ${{ steps.provider_config.outputs.responses_api_endpoint }}
          prompt-file: .codex-smart-contract-auditor/prompt.md
          output-file: .codex-smart-contract-auditor/final-message.md
          safety-strategy: drop-sudo
          sandbox: workspace-write
          codex-args: '["--full-auto"]'
          model: ${{ steps.provider_config.outputs.model }}
          effort: ${{ steps.provider_config.outputs.effort }}

      - name: Run Codex sequential audit with Venice
        id: run_codex_venice
        if: ${{ steps.provider_config.outputs.provider == 'venice' && steps.provider_config.outputs.key_source == 'venice' }}
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ env.VENICE_API_KEY_VALUE }}
          responses-api-endpoint: ${{ steps.provider_config.outputs.responses_api_endpoint }}
          prompt-file: .codex-smart-contract-auditor/prompt.md
          output-file: .codex-smart-contract-auditor/final-message.md
          safety-strategy: drop-sudo
          sandbox: workspace-write
          codex-args: '["--full-auto"]'
          model: ${{ steps.provider_config.outputs.model }}
          effort: ${{ steps.provider_config.outputs.effort }}

      - name: Run Codex sequential audit with Venice key from OPENAI_API_KEY
        id: run_codex_venice_fallback
        if: ${{ steps.provider_config.outputs.provider == 'venice' && steps.provider_config.outputs.key_source == 'openai-fallback' }}
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ env.OPENAI_API_KEY_VALUE }}
          responses-api-endpoint: ${{ steps.provider_config.outputs.responses_api_endpoint }}
          prompt-file: .codex-smart-contract-auditor/prompt.md
          output-file: .codex-smart-contract-auditor/final-message.md
          safety-strategy: drop-sudo
          sandbox: workspace-write
          codex-args: '["--full-auto"]'
          model: ${{ steps.provider_config.outputs.model }}
          effort: ${{ steps.provider_config.outputs.effort }}

      - name: Validate or synthesize audit outputs
        id: validate_outputs
        shell: bash
        env:
          API_KEY_PRESENT: ${{ steps.provider_config.outputs.api_key_present }}
          PROVIDER: ${{ steps.provider_config.outputs.provider }}
          PROVIDER_KEY_SOURCE: ${{ steps.provider_config.outputs.key_source }}
          RESPONSES_API_ENDPOINT: ${{ steps.provider_config.outputs.responses_api_endpoint }}
          CODEX_OUTCOME: ${{ steps.run_codex_openai.outcome || steps.run_codex_venice.outcome || steps.run_codex_venice_fallback.outcome }}
          BASE_SHA: ${{ steps.context.outputs.base_sha }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          MODEL_INPUT: ${{ steps.provider_config.outputs.model }}
          SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        run: |
          set -euo pipefail

          if [[ ! -f audit-report.md ]]; then
            {
              printf '# Smart Contract Audit Report\n\n'
              printf '## Executive Summary\n\n'
              printf 'The reusable workflow did not receive a complete audit report from Codex. A fallback report was generated so the workflow still emits deterministic artifacts.\n\n'
              printf '## Scope\n\n'
              printf -- '- Base SHA: %s\n' "${BASE_SHA:-unavailable}"
              printf -- '- Head SHA: %s\n' "${HEAD_SHA:-unavailable}"
              printf -- '- Pull request number: %s\n\n' "${PR_NUMBER:-unavailable}"
              printf '## Skills / Checks Run\n\n'
              printf -- '- secure-workflow-guide: blocked\n'
              printf -- '- smart-contract-audit: blocked\n\n'
              printf '## Findings Table\n\n'
              printf 'No confirmed findings were emitted because the audit did not complete.\n\n'
              printf '## Blocked Checks\n\n'
              printf -- '- Codex audit execution\n'
              printf '  - Reason: %s\n' "$(if [[ "$API_KEY_PRESENT" != "true" ]]; then printf 'No API key was provided for provider %s.' "$PROVIDER"; else echo "Codex action for provider '$PROVIDER' finished with outcome '$CODEX_OUTCOME' or did not write the required report files."; fi)"
              printf '  - Next step: Provide a valid provider API key, confirm repository prompts are valid, and re-run the workflow.\n'
            } > audit-report.md
          fi

          if ! jq empty audit-report.json >/dev/null 2>&1; then
            blocked_reason="Codex did not write a valid audit-report.json file."
            if [[ "$API_KEY_PRESENT" != "true" ]]; then
              blocked_reason="No API key was provided for provider '$PROVIDER'."
            elif [[ "$CODEX_OUTCOME" == "failure" ]]; then
              blocked_reason="Codex action for provider '$PROVIDER' failed before producing a valid JSON report."
            fi

            jq -n \
              --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg repository "${GITHUB_REPOSITORY}" \
              --arg pr_number "${PR_NUMBER:-}" \
              --arg base_sha "${BASE_SHA:-}" \
              --arg head_sha "${HEAD_SHA:-}" \
              --arg model "${MODEL_INPUT:-}" \
              --arg provider "${PROVIDER:-openai}" \
              --arg provider_key_source "${PROVIDER_KEY_SOURCE:-}" \
              --arg responses_api_endpoint "${RESPONSES_API_ENDPOINT:-}" \
              --arg severity_threshold "${SEVERITY_THRESHOLD}" \
              --arg blocked_reason "$blocked_reason" \
              '{
                schema_version: "1.0",
                generated_at: $generated_at,
                repository: $repository,
                pr_number: (if $pr_number == "" then null else ($pr_number | tonumber?) end),
                base_sha: $base_sha,
                head_sha: $head_sha,
                provider: $provider,
                provider_key_source: (if $provider_key_source == "" then null else $provider_key_source end),
                responses_api_endpoint: (if $responses_api_endpoint == "" then null else $responses_api_endpoint end),
                model: $model,
                severity_threshold: $severity_threshold,
                summary: {
                  critical: 0,
                  high: 0,
                  medium: 0,
                  low: 0,
                  informational: 0,
                  blocked_checks: 1
                },
                scope: {
                  changed_files: [],
                  blast_radius_files: [],
                  contracts_reviewed: [],
                  tests_reviewed: []
                },
                checks_run: [
                  {
                    name: "secure-workflow-guide",
                    source: "trail-of-bits",
                    status: "blocked",
                    notes: $blocked_reason,
                    artifact_paths: [".codex-smart-contract-auditor/preflight"]
                  },
                  {
                    name: "smart-contract-audit",
                    source: "forefy",
                    status: "blocked",
                    notes: $blocked_reason,
                    artifact_paths: [".context/outputs"]
                  }
                ],
                findings: [],
                security_properties: [],
                blocked_checks: [
                  {
                    check: "codex-sequential-audit",
                    reason: $blocked_reason,
                    next_step: "Provide a valid provider API key and re-run the workflow."
                  }
                ],
                artifacts: [
                  {
                    path: ".codex-smart-contract-auditor/preflight",
                    kind: "preflight"
                  },
                  {
                    path: ".context/outputs",
                    kind: "forefy-output"
                  },
                  {
                    path: "audit-report.md",
                    kind: "report"
                  },
                  {
                    path: "audit-report.json",
                    kind: "json"
                  }
                ]
              }' > audit-report.json
          fi

          jq empty audit-report.json >/dev/null

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          retention-days: 14
          path: |
            audit-report.md
            audit-report.json
            .context/outputs
            .codex-smart-contract-auditor/final-message.md
            .codex-smart-contract-auditor/runtime-context.md
            .codex-smart-contract-auditor/prompt.md
            .codex-smart-contract-auditor/preflight
            .codex-smart-contract-auditor/installed-skills.txt

      - name: Summarize audit result
        id: summarize
        shell: bash
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        run: |
          set -euo pipefail
          critical="$(jq -r '.summary.critical // 0' audit-report.json)"
          high="$(jq -r '.summary.high // 0' audit-report.json)"
          medium="$(jq -r '.summary.medium // 0' audit-report.json)"
          low="$(jq -r '.summary.low // 0' audit-report.json)"
          informational="$(jq -r '.summary.informational // 0' audit-report.json)"
          blocked_checks="$(jq -r '.summary.blocked_checks // 0' audit-report.json)"

          overall_status="clean"
          if (( critical + high + medium + low + informational > 0 )); then
            overall_status="findings"
          fi
          if (( blocked_checks > 0 )) && [[ "$overall_status" == "clean" ]]; then
            overall_status="blocked"
          fi

          echo "artifact_name=audit-results" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "overall_status=$overall_status" >> "$GITHUB_OUTPUT"
          echo "critical=$critical" >> "$GITHUB_OUTPUT"
          echo "high=$high" >> "$GITHUB_OUTPUT"
          echo "medium=$medium" >> "$GITHUB_OUTPUT"
          echo "low=$low" >> "$GITHUB_OUTPUT"
          echo "informational=$informational" >> "$GITHUB_OUTPUT"
          echo "blocked_checks=$blocked_checks" >> "$GITHUB_OUTPUT"

      - name: Enforce severity threshold
        if: ${{ inputs.fail-on-severity != '' }}
        shell: bash
        env:
          THRESHOLD: ${{ inputs.fail-on-severity }}
        run: |
          set -euo pipefail
          critical="$(jq -r '.summary.critical // 0' audit-report.json)"
          high="$(jq -r '.summary.high // 0' audit-report.json)"
          medium="$(jq -r '.summary.medium // 0' audit-report.json)"
          low="$(jq -r '.summary.low // 0' audit-report.json)"
          informational="$(jq -r '.summary.informational // 0' audit-report.json)"

          case "$THRESHOLD" in
            critical) total=$critical ;;
            high) total=$((critical + high)) ;;
            medium) total=$((critical + high + medium)) ;;
            low) total=$((critical + high + medium + low)) ;;
            informational) total=$((critical + high + medium + low + informational)) ;;
            *)
              echo "Unsupported fail-on-severity value: $THRESHOLD" >&2
              exit 1
              ;;
          esac

          if (( total > 0 )); then
            echo "Found $total finding(s) at or above severity '$THRESHOLD'." >&2
            exit 1
          fi

  comment:
    name: Update sticky pull request comment
    runs-on: ubuntu-latest
    needs: audit
    if: ${{ always() && inputs.post-pr-comment && needs.audit.outputs.pr_number != '' }}
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Download audit artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.audit.outputs.artifact_name }}

      - name: Upsert sticky summary comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.audit.outputs.pr_number }}
          OVERALL_STATUS: ${{ needs.audit.outputs.overall_status }}
          CRITICAL: ${{ needs.audit.outputs.critical }}
          HIGH: ${{ needs.audit.outputs.high }}
          MEDIUM: ${{ needs.audit.outputs.medium }}
          LOW: ${{ needs.audit.outputs.low }}
          INFORMATIONAL: ${{ needs.audit.outputs.informational }}
          BLOCKED_CHECKS: ${{ needs.audit.outputs.blocked_checks }}
          ARTIFACT_NAME: ${{ needs.audit.outputs.artifact_name }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const marker = "<!-- codex-smart-contract-audit -->";
            const prNumber = Number(process.env.PR_NUMBER);
            const report = JSON.parse(fs.readFileSync("audit-report.json", "utf8"));

            const lines = [
              marker,
              "## Codex Smart Contract Audit",
              "",
              `Status: **${process.env.OVERALL_STATUS}**`,
              "",
              "| Severity | Count |",
              "| --- | ---: |",
              `| Critical | ${process.env.CRITICAL} |`,
              `| High | ${process.env.HIGH} |`,
              `| Medium | ${process.env.MEDIUM} |`,
              `| Low | ${process.env.LOW} |`,
              `| Informational | ${process.env.INFORMATIONAL} |`,
              `| Blocked checks | ${process.env.BLOCKED_CHECKS} |`,
              "",
              `Artifacts: \`${process.env.ARTIFACT_NAME}\``,
              "",
              "The full markdown report and machine-readable JSON report are attached to this workflow run as artifacts."
            ];

            if ((report.blocked_checks || []).length > 0) {
              lines.push("");
              lines.push("Blocked checks:");
              for (const blocked of report.blocked_checks.slice(0, 3)) {
                lines.push(`- ${blocked.check}: ${blocked.reason}`);
              }
            }

            const body = lines.join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
