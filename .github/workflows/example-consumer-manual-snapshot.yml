name: Manual Branch Snapshot Audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    uses: MikeHathaway/smart-contract-auditor/.github/workflows/codex-smart-contract-audit.yml@main
    with:
      provider: auto
      audit-mode: snapshot
      # Choose the branch in the GitHub Actions "Run workflow" UI,
      # or use `gh workflow run ... --ref <branch>`.
      model: ""
      effort: ""
      working-directory: .
      severity-threshold: medium
      fail-on-severity: high
      post-pr-comment: false
      pr-number: ""
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VENICE_API_KEY: ${{ secrets.VENICE_API_KEY }}
